services:
  - type: web
    name: ocean-match-mvp
    runtime: static
    buildCommand: bash scripts/render_build.sh
    staticPublishPath: build/web
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: OCEAN_MATCH_API_ORIGIN
        fromService:
          type: web
          name: ocean-match-api
          envVarKey: RENDER_EXTERNAL_URL
    previews:
      generation: automatic

  - type: web
    name: ocean-match-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    preDeployCommand: node dist/scripts/migrate.js
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ocean-match-db
          property: connectionString
      - key: API_PUBLIC_BASE_URL
        fromService:
          type: web
          name: ocean-match-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: ocean-match-mvp
          envVarKey: RENDER_EXTERNAL_URL
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_TTL_DAYS
        value: "30"
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: MIN_PROFILE_PHOTOS
        value: "0"
      - key: PHOTO_STORAGE_DRIVER
        value: mock
      - key: PHOTO_BUCKET
        value: ocean-match-photos
      - key: PHOTO_PUBLIC_BASE_URL
        fromService:
          type: web
          name: ocean-match-api
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: ocean-match-db
    plan: basic-256mb
    databaseName: ocean_match
    user: ocean_match
