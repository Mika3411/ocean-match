services:
  postgres:
    image: postgres:16-alpine
    container_name: ocean-match-postgres
    environment:
      POSTGRES_DB: ocean_match
      POSTGRES_USER: ocean_match
      POSTGRES_PASSWORD: ocean_match
    ports:
      - "5432:5432"
    volumes:
      - ocean_match_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocean_match -d ocean_match"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ocean_match_postgres:
